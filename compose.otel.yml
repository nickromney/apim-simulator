services:
  lgtm:
    image: grafana/otel-lgtm:0.24.0@sha256:a7fbde2893d86ae4807701bc482736243e584eb90b5faa273d291ffff2a1374f
    init: true
    read_only: true
    ports:
      - "${GRAFANA_PORT:-3001}:3000"
      - "${OTEL_GRPC_PORT:-4317}:4317"
      - "${OTEL_HTTP_PORT:-4318}:4318"
    environment:
      ENABLE_LOGS_ALL: "true"
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
    volumes:
      - lgtm-data:/data
      - ./observability/grafana/provisioning/dashboards/apim-simulator.yaml:/otel-lgtm/grafana/conf/provisioning/dashboards/apim-simulator.yaml:ro
      - ./observability/grafana/dashboards:/otel-lgtm/custom-dashboards:ro
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    networks:
      - apim

  apim-simulator:
    environment:
      OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
      OTEL_EXPORTER_OTLP_ENDPOINT: http://lgtm:4318
      OTEL_DEPLOYMENT_ENVIRONMENT: local
      OTEL_SERVICE_NAMESPACE: apim-simulator
    depends_on:
      lgtm:
        condition: service_started

volumes:
  lgtm-data:
